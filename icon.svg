<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="40%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#001a08"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="50%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#00c850"/>
    </linearGradient>
    <linearGradient id="cameraGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c850"/>
      <stop offset="100%" stop-color="#00ff66"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>
  <rect x="6" y="6" width="500" height="500" rx="112"
        fill="none" stroke="url(#borderGrad)" stroke-width="14" opacity="0.9"/>
  <rect x="18" y="18" width="476" height="476" rx="104"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Cuerpo cámara -->
  <rect x="96" y="148" width="320" height="240" rx="52"
        fill="none" stroke="url(#cameraGrad)" stroke-width="26" filter="url(#glow)"/>

  <!-- Lente exterior -->
  <circle cx="256" cy="268" r="76"
          fill="none" stroke="url(#cameraGrad)" stroke-width="22" filter="url(#glow)"/>

  <!-- Lente interior -->
  <circle cx="256" cy="268" r="42" fill="#e50914" opacity="0.15"/>
  <circle cx="256" cy="268" r="42" fill="none" stroke="#ff2d55" stroke-width="10"/>

  <!-- Flash verde -->
  <circle cx="390" cy="192" r="22" fill="url(#dotGrad)" filter="url(#softglow)"/>

  <!-- Bump superior -->
  <rect x="196" y="130" width="90" height="36" rx="14"
        fill="none" stroke="url(#cameraGrad)" stroke-width="20"/>

  <!-- ISX dentro del lente -->
  <text x="256" y="277" font-size="32" text-anchor="middle" dominant-baseline="middle"
        font-family="'Arial Black', Impact, sans-serif"
        font-weight="900" fill="#ffffff" opacity="0.9" letter-spacing="1">ISX</text>

  <!-- Nombre abajo -->
  <text x="256" y="432" font-size="46" text-anchor="middle"
        font-family="'Arial Black', Impact, sans-serif"
        font-weight="900" fill="url(#borderGrad)" letter-spacing="3" opacity="0.95">INSTASUNX</text>
</svg>
